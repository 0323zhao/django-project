<!DOCTYPE html><html lang=""><head><meta charset="utf-8"><meta name="referrer" content="no-referrer"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="./favicon.ico"><link rel="stylesheet" type="text/css" href="css/swiper.min.css"><link rel="stylesheet" icon="icon" href="//at.alicdn.com/t/c/font_4097802_w9071sf3dx.css"><script src="js/swiper.min.js" charset="utf-8"></script><script src="verifys/jquery-3.4.1.min.js"></script><script src="verifys/yz.js"></script><script src="verifys/verify.js"></script><title>客户端-基于spank的社交媒体情感分析系统的设计与实现</title><link href="./css/app.af8d5ba7.css" rel="preload" as="style"><link href="./css/chunk-vendors.1622b503.css" rel="preload" as="style"><link href="./js/app.e869527f.js" rel="preload" as="script"><link href="./js/chunk-vendors.89a66b41.js" rel="preload" as="script"><link href="./css/chunk-vendors.1622b503.css" rel="stylesheet"><link href="./css/app.af8d5ba7.css" rel="stylesheet"></head><body><noscript><strong>We're sorry but front doesn't work properly without JavaScript enabled. Please enable it to continue.</strong></noscript><div id="app"></div><script src="./vendor.dll.js"></script><script src="./js/chunk-vendors.89a66b41.js"></script><script src="./js/app.e869527f.js"></script>
<script>
(function() {
    // 持续检测，适应 SPA 路由切换
    setInterval(function() {
        var hash = window.location.hash;
        var isListPage = (hash.indexOf('#/index/pinglunfenxi') !== -1 &&
                          hash.indexOf('Add') === -1 &&
                          hash.indexOf('Detail') === -1);

        var btnBox = document.querySelector('.list-btn-box');
        var existingBtn = document.getElementById('batchAnalyzeBtn');

        if (isListPage && btnBox && !existingBtn) {
            // 创建按钮
            var btn = document.createElement('button');
            btn.id = 'batchAnalyzeBtn';
            btn.className = 'el-button el-button--success list-static-btn';
            btn.innerHTML = '<span class="icon iconfont"></span> 批量情感分析 ';
            btn.isRunning = false;
            btn.isPaused = false;

            var doFetch = function(url) {
                btn.isRunning = true;
                btn.isPaused = false;
                btn.className = 'el-button el-button--danger list-static-btn';
                btn.innerHTML = '<span class="icon iconfont"></span> 停止分析 ';
                btn.onclick = stopAnalyze;
                fetch(url)
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        btn.isRunning = false;
                        if (data.code === 0 && data.data && data.data.stopped) {
                            btn.isPaused = true;
                            btn.className = 'el-button el-button--primary list-static-btn';
                            btn.innerHTML = '<span class="icon iconfont"></span> 继续分析 ';
                            btn.onclick = resumeAnalyze;
                        } else if (data.code === 0) {
                            btn.className = 'el-button el-button--info list-static-btn';
                            btn.innerHTML = '<span class="icon iconfont"></span> 分析完成，点击刷新 ';
                            btn.onclick = function() { location.reload(); };
                        } else {
                            btn.className = 'el-button el-button--success list-static-btn';
                            btn.innerHTML = '<span class="icon iconfont"></span> 请求失败，点击重试 ';
                            btn.onclick = startAnalyze;
                        }
                    })
                    .catch(function() {
                        btn.isRunning = false;
                        btn.className = 'el-button el-button--success list-static-btn';
                        btn.innerHTML = '<span class="icon iconfont"></span> 请求失败，点击重试 ';
                        btn.onclick = startAnalyze;
                    });
            };

            var startAnalyze = function() {
                doFetch('/djangop8gh5erc/pinglunfenxi/batchAnalyze');
            };

            var resumeAnalyze = function() {
                doFetch('/djangop8gh5erc/pinglunfenxi/batchAnalyze?resume=1');
            };

            var stopAnalyze = function() {
                if (!btn.isRunning) return;
                btn.className = 'el-button el-button--warning list-static-btn';
                btn.innerHTML = '<span class="icon iconfont"></span> 正在停止... ';
                btn.disabled = true;
                fetch('/djangop8gh5erc/pinglunfenxi/stopBatchAnalyze')
                    .then(function() {
                        setTimeout(function() {
                            btn.isRunning = false;
                            btn.isPaused = true;
                            btn.className = 'el-button el-button--primary list-static-btn';
                            btn.innerHTML = '<span class="icon iconfont"></span> 继续分析 ';
                            btn.onclick = resumeAnalyze;
                            btn.disabled = false;
                        }, 1500);
                    })
                    .catch(function() {
                        btn.isRunning = false;
                        btn.className = 'el-button el-button--success list-static-btn';
                        btn.innerHTML = '<span class="icon iconfont"></span> 批量情感分析 ';
                        btn.onclick = startAnalyze;
                        btn.disabled = false;
                    });
            };

            btn.onclick = startAnalyze;
            btnBox.appendChild(btn);
        } else if (!isListPage && existingBtn) {
            // 离开列表页则移除按钮
            existingBtn.remove();
        }
    }, 500);
})();
</script>
</body></html>
